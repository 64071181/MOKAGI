<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>系統監控</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Cascadia Code', 'Courier New', monospace;
            padding: 12px;
            margin: 0;
            font-size: 14px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        .card {
            background: #252526;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border-left: 4px solid #4ec9b0;
            overflow-x: auto;
        }
        h2 {
            color: #4ec9b0;
            margin-top: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .cpu-meter {
            background: #2d2d30;
            border-radius: 12px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            margin: 12px 0;
        }
        .cpu-fill {
            background: #4ec9b0;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1e1e1e;
            padding: 8px 12px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #aaa;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4ec9b0;
        }
        /* 內存儀表樣式 */
        .memory-bars {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
        }
        .mem-bar-container {
            margin-bottom: 12px;
        }
        .mem-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 4px;
        }
        .mem-bar-bg {
            background: #2d2d30;
            border-radius: 6px;
            height: 16px;
            overflow: hidden;
            display: flex;
        }
        .mem-segment {
            height: 100%;
        }
        .mem-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            font-size: 0.7rem;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            display: inline-block;
            border-radius: 2px;
            margin-right: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th, td {
            text-align: left;
            padding: 6px 4px;
            border-bottom: 1px solid #3e3e42;
        }
        th {
            color: #4ec9b0;
            font-weight: normal;
        }
        .process-cpu {
            color: #ffcc66;
        }
        .process-mem {
            color: #66ccff;
        }
        .process-pid {
            color: #888;
        }
        button {
            background: #4ec9b0;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }
        button:hover {
            background: #e0a800;
        }
        @media (max-width: 768px) {
            body {
                font-size: 12px;
                padding: 8px;
            }
            .stat-value {
                font-size: 1rem;
            }
            table {
                font-size: 0.7rem;
            }
            th, td {
                padding: 4px 2px;
            }
        }
        .refresh-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="refresh-bar">
        <span id="autoStatus">⏱️ 自動刷新 2s</span>
        <button onclick="fetchStats()">🔄 手動</button>
        <button onclick="toggleAuto()" id="autoToggleBtn">⏸️ 暫停</button>
    </div>

    <!-- CPU 卡片 -->
    <div class="card">
        <h2>🖥️ CPU 使用率</h2>
        <div class="cpu-meter">
            <div class="cpu-fill" id="cpuFill"></div>
        </div>
        <div id="cpuPercent" class="stat-value" style="text-align:center;">--%</div>
    </div>

    <!-- 內存儀表盤（類 htop 風格） -->
    <div class="card">
        <h2>📊 內存使用情況</h2>
        <div class="memory-bars">
            <div class="mem-bar-container">
                <div class="mem-bar-label">
                    <span>💾 實體內存</span>
                    <span id="memTotalLabel">0 MB</span>
                </div>
                <div class="mem-bar-bg" id="memBar"></div>
                <div class="mem-legend">
                    <span><span class="legend-color" style="background:#4ec9b0;"></span> 已用</span>
                    <span><span class="legend-color" style="background:#66ccff;"></span> 緩衝區</span>
                    <span><span class="legend-color" style="background:#ffcc66;"></span> 快取</span>
                    <span><span class="legend-color" style="background:#888;"></span> 空閒</span>
                </div>
            </div>
            <div class="mem-bar-container">
                <div class="mem-bar-label">
                    <span>💿 交換分區</span>
                    <span id="swapTotalLabel">0 MB</span>
                </div>
                <div class="mem-bar-bg" id="swapBar"></div>
                <div class="mem-legend">
                    <span><span class="legend-color" style="background:#e0a800;"></span> 已用</span>
                    <span><span class="legend-color" style="background:#888;"></span> 空閒</span>
                </div>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">1分鐘負載</div>
                <div class="stat-value" id="load1">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">5分鐘負載</div>
                <div class="stat-value" id="load5">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">15分鐘負載</div>
                <div class="stat-value" id="load15">-</div>
            </div>
        </div>
    </div>

    <!-- 進程列表 -->
    <div class="card">
        <h2>📋 進程列表 (按CPU排序)</h2>
        <div style="overflow-x: auto;">
            <table id="processTable">
                <thead>
                    <tr>
                        <th>PID</th>
                        <th>USER</th>
                        <th>%CPU</th>
                        <th>%MEM</th>
                        <th>COMMAND</th>
                    </tr>
                </thead>
                <tbody id="processBody">
                    <tr><td colspan="5">載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let autoInterval = null;
    let autoEnabled = true;
    let intervalSeconds = 2;

    async function fetchStats() {
        try {
            // CPU
            const cpuRes = await fetch('/api/system/cpu');
            const cpuData = await cpuRes.json();
            if (cpuData.success) {
                const percent = cpuData.percent;
                document.getElementById('cpuPercent').innerText = percent + '%';
                document.getElementById('cpuFill').style.width = percent + '%';
            } else {
                document.getElementById('cpuPercent').innerText = '錯誤';
            }

            // 內存詳細數據
            const memRes = await fetch('/api/system/meminfo');
            const memData = await memRes.json();
            if (memData.success) {
                updateMemoryBars(memData);
            }

            // top 進程數據
            const topRes = await fetch('/api/system/top');
            const topData = await topRes.json();
            if (topData.success) {
                parseTopOutput(topData);
            }
        } catch (err) {
            console.error('獲取失敗', err);
        }
    }

    function updateMemoryBars(data) {
        // 物理內存
        const total = data.total_mb;
        const used = data.used_mb;
        const buffers = data.buffers_mb;
        const cached = data.cached_mb;
        const free = data.free_mb;
        
        document.getElementById('memTotalLabel').innerText = total + ' MB';
        
        // 構建分段進度條
        const memBar = document.getElementById('memBar');
        memBar.innerHTML = '';
        if (total > 0) {
            const usedPercent = (used / total) * 100;
            const buffersPercent = (buffers / total) * 100;
            const cachedPercent = (cached / total) * 100;
            const freePercent = (free / total) * 100;
            
            const usedDiv = createSegment(usedPercent, '#4ec9b0');
            const buffersDiv = createSegment(buffersPercent, '#66ccff');
            const cachedDiv = createSegment(cachedPercent, '#ffcc66');
            const freeDiv = createSegment(freePercent, '#888');
            memBar.append(usedDiv, buffersDiv, cachedDiv, freeDiv);
        }
        
        // 交換分區
        const swapTotal = data.swap_total_mb;
        const swapUsed = data.swap_used_mb;
        document.getElementById('swapTotalLabel').innerText = swapTotal + ' MB';
        const swapBar = document.getElementById('swapBar');
        swapBar.innerHTML = '';
        if (swapTotal > 0) {
            const usedPercent = (swapUsed / swapTotal) * 100;
            const freePercent = ((swapTotal - swapUsed) / swapTotal) * 100;
            const usedDiv = createSegment(usedPercent, '#e0a800');
            const freeDiv = createSegment(freePercent, '#888');
            swapBar.append(usedDiv, freeDiv);
        } else {
            swapBar.innerHTML = '<div style="width:100%; background:#888; height:100%;"></div>';
        }
    }
    
    function createSegment(percent, color) {
        const div = document.createElement('div');
        div.style.width = percent + '%';
        div.style.backgroundColor = color;
        div.style.height = '100%';
        return div;
    }

    function parseTopOutput(data) {
        const header = data.header || [];
        const processes = data.processes || [];
        
        // 負載
        let loadAvg = ['-', '-', '-'];
        for (let line of header) {
            if (line.includes('load average:')) {
                const match = line.match(/load average: ([\d.]+), ([\d.]+), ([\d.]+)/);
                if (match) loadAvg = [match[1], match[2], match[3]];
            }
        }
        document.getElementById('load1').innerText = loadAvg[0];
        document.getElementById('load5').innerText = loadAvg[1];
        document.getElementById('load15').innerText = loadAvg[2];
        
        // 進程列表
        const tbody = document.getElementById('processBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        for (let proc of processes.slice(0, 30)) {
            const parts = proc.trim().split(/\s+/);
            if (parts.length < 12) continue;
            const pid = parts[0];
            const user = parts[1];
            const cpu = parts[8];
            const mem = parts[9];
            const command = parts.slice(11).join(' ');
            const row = `<tr>
                <td class="process-pid">${pid}</td>
                <td>${user}</td>
                <td class="process-cpu">${cpu}%</td>
                <td class="process-mem">${mem}%</td>
                <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${command}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
        if (tbody.innerHTML === '') tbody.innerHTML = '<tr><td colspan="5">無進程數據</td></tr>';
    }

    function startAutoRefresh(seconds) {
        if (autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => {
            if (autoEnabled) fetchStats();
        }, seconds * 1000);
    }

    function toggleAuto() {
        autoEnabled = !autoEnabled;
        const btn = document.getElementById('autoToggleBtn');
        const statusSpan = document.getElementById('autoStatus');
        if (autoEnabled) {
            btn.innerText = '⏸️ 暫停';
            statusSpan.innerText = `⏱️ 自動刷新 ${intervalSeconds}s`;
            fetchStats();
        } else {
            btn.innerText = '▶️ 啟動';
            statusSpan.innerText = '⏹️ 已暫停';
        }
    }

    // 初始化
    startAutoRefresh(intervalSeconds);
    fetchStats();
</script>
</body>
</html>
